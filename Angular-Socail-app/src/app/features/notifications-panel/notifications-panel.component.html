<section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
  <div class="flex items-center justify-between gap-3">
    <div>
      <h2 class="font-bold text-slate-950">Notifications</h2>
      <p class="text-xs text-slate-500">Loaded from the backend activity service.</p>
    </div>
    <button class="rounded-md border border-slate-300 px-3 py-2 text-xs font-semibold text-slate-700 transition hover:border-ocean hover:text-ocean" type="button" (click)="refresh()">
      Refresh
    </button>
  </div>

  <div class="mt-4 space-y-2">
    @for (notification of store.notifications(); track notification.id) {
      <article class="rounded-lg border p-3" [ngClass]="notification.unread ? 'border-sun/30 bg-amber-50' : 'border-slate-200 bg-slate-50'">
        <p class="text-sm font-bold text-slate-950">{{ notification.title }}</p>
        <p class="mt-1 text-xs leading-5 text-slate-600">{{ notification.body }}</p>
      </article>
    }
  </div>

  <button class="mt-3 min-h-10 w-full rounded-md bg-slate-100 text-sm font-semibold text-slate-700 transition hover:bg-slate-200" type="button" (click)="markRead()">
    Mark all read
  </button>
</section>
