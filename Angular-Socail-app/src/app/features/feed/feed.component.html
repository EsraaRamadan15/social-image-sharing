<section class="space-y-4">
  <div class="flex items-center justify-between gap-3">
    <div>
      <h2 class="text-xl font-bold text-slate-950">Home feed</h2>
      <p class="text-sm text-slate-500">Loaded from the backend feed service with local fallback data.</p>
    </div>
    <button class="min-h-10 rounded-md border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:border-ocean hover:text-ocean" type="button" (click)="refreshFeed()">
      Refresh
    </button>
  </div>

  @for (post of store.posts(); track post.id) {
    <app-post-card [post]="post" />
  } @empty {
    <div class="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center text-sm text-slate-500">
      No posts yet. Create the first one from the composer.
    </div>
  }
</section>
