<section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
  <div class="flex rounded-lg bg-slate-100 p-1">
    <button
      class="min-h-10 flex-1 rounded-md text-sm font-semibold transition"
      [ngClass]="mode === 'login' ? 'bg-white text-slate-950 shadow-sm' : 'text-slate-500 hover:text-slate-900'"
      type="button"
      (click)="setMode('login')"
    >
      Login
    </button>
    <button
      class="min-h-10 flex-1 rounded-md text-sm font-semibold transition"
      [ngClass]="mode === 'register' ? 'bg-white text-slate-950 shadow-sm' : 'text-slate-500 hover:text-slate-900'"
      type="button"
      (click)="setMode('register')"
    >
      Register
    </button>
  </div>

  <form class="mt-4 space-y-3" (ngSubmit)="submit()">
    @if (mode === 'register') {
      <label class="block text-sm font-semibold text-slate-700">
        Display name
        <input class="mt-1 min-h-10 w-full rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-ocean focus:ring-2 focus:ring-ocean/20" name="displayName" [(ngModel)]="displayName" />
      </label>
      <label class="block text-sm font-semibold text-slate-700">
        User name
        <input class="mt-1 min-h-10 w-full rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-ocean focus:ring-2 focus:ring-ocean/20" name="userName" [(ngModel)]="userName" />
      </label>
    }

    <label class="block text-sm font-semibold text-slate-700">
      Email
      <input class="mt-1 min-h-10 w-full rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-ocean focus:ring-2 focus:ring-ocean/20" type="email" name="email" [(ngModel)]="email" />
    </label>

    <label class="block text-sm font-semibold text-slate-700">
      Password
      <input class="mt-1 min-h-10 w-full rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-ocean focus:ring-2 focus:ring-ocean/20" type="password" name="password" [(ngModel)]="password" />
    </label>

    <button class="min-h-11 w-full rounded-md bg-ocean px-4 text-sm font-bold text-white transition hover:bg-slate-950" type="submit">
      {{ mode === 'login' ? 'Sign in with API' : 'Create account with API' }}
    </button>
  </form>
</section>
