<section class="border-b border-slate-200 bg-white/95">
  <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
    <div>
      <p class="text-sm font-semibold text-ocean">Social image client</p>
      <h1 class="text-2xl font-bold text-slate-950">Core-connected Angular app</h1>
    </div>

    <div class="grid gap-2 sm:grid-cols-[minmax(16rem,26rem)_auto_auto] sm:items-center">
      <input
        class="min-h-11 rounded-md border border-slate-300 bg-white px-3 text-sm outline-none transition focus:border-ocean focus:ring-2 focus:ring-ocean/20"
        [value]="store.apiBaseUrl()"
        (input)="updateBaseUrl($event)"
        aria-label="Backend API base URL"
      />

      <span class="rounded-md border px-3 py-2 text-center text-xs font-bold" [ngClass]="statusClass()">
        {{ store.status() }}
      </span>

      <button
        class="min-h-11 rounded-md bg-slate-950 px-4 text-sm font-semibold text-white transition hover:bg-ocean focus:outline-none focus:ring-2 focus:ring-ocean/30"
        type="button"
        (click)="reconnect()"
      >
        Connect
      </button>
    </div>
  </div>

  <div class="mx-auto max-w-7xl px-4 pb-4 sm:px-6 lg:px-8">
    <p class="rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">{{ store.message() }}</p>
  </div>
</section>
