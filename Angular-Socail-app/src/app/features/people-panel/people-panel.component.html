<section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
  <h2 class="font-bold text-slate-950">People</h2>
  <form class="mt-3 flex gap-2" (ngSubmit)="search()">
    <input
      class="min-h-10 min-w-0 flex-1 rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-ocean focus:ring-2 focus:ring-ocean/20"
      name="peopleSearch"
      placeholder="Search people"
      [(ngModel)]="query"
    />
    <button class="min-h-10 rounded-md bg-slate-950 px-3 text-sm font-semibold text-white transition hover:bg-ocean" type="submit">
      Search
    </button>
  </form>

  <div class="mt-4 space-y-3">
    @for (person of store.people(); track person.id) {
      <article class="rounded-lg border border-slate-200 p-3">
        <div class="flex items-start gap-3">
          <img class="h-10 w-10 rounded-full object-cover" [src]="person.avatarUrl" [alt]="person.displayName + ' avatar'" />
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-bold text-slate-950">{{ person.displayName }}</p>
            <p class="text-xs text-slate-500">{{ person.handle }}</p>
            <p class="mt-2 text-xs leading-5 text-slate-600">{{ person.bio }}</p>
          </div>
        </div>
        <button
          class="mt-3 min-h-9 w-full rounded-md border px-3 text-sm font-semibold transition"
          [class.border-ocean]="!person.isFollowing"
          [class.bg-ocean]="!person.isFollowing"
          [class.text-white]="!person.isFollowing"
          [class.border-slate-300]="person.isFollowing"
          [class.text-slate-700]="person.isFollowing"
          type="button"
          (click)="follow(person)"
        >
          {{ person.isFollowing ? 'Following' : 'Follow' }}
        </button>
      </article>
    } @empty {
      <p class="rounded-lg border border-dashed border-slate-300 p-4 text-sm text-slate-500">No people found.</p>
    }
  </div>
</section>
